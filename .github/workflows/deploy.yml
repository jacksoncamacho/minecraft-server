on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # ─── Job 1: Terraform ────────────────────────────────────────────────────────
  terraform:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.vars.outputs.instance_id }}
      s3_bucket:   ${{ steps.vars.outputs.s3_bucket }}
      mods_changed: ${{ steps.changed.outputs.mods_changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 to diff changed files

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Detect changed asset paths
        id: changed
        run: |
          # Check if mods/ or media/ changed in this commit
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(mods|media)/'; then
            echo "mods_changed=true"  >> $GITHUB_OUTPUT
          else
            echo "mods_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      # Trigger a world backup on the running instance before Terraform destroys it
      - name: Pre-deploy backup (save world before destroy)
        continue-on-error: true
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances --region us-east-1 \
            --filters "Name=tag:Name,Values=minecraft-server-final-production" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)
          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            echo "Triggering pre-deploy backup on $INSTANCE_ID..."
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["bash /usr/local/bin/minecraft-backup.sh"]' \
              --query "Command.CommandId" --output text)
            echo "Waiting for backup to complete (up to 60s)..."
            aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" 2>/dev/null || \
              sleep 30
            echo "Pre-deploy backup done."
          else
            echo "No running instance found — skipping pre-deploy backup."
          fi

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Export Terraform outputs
        id: vars
        working-directory: ./terraform
        run: |
          echo "instance_id=$(terraform output -raw instance_id)"  >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT

  # ─── Job 2: Sync assets & boot ───────────────────────────────────────────────
  sync:
    name: "Sync Assets & Boot"
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Only runs when mods/ or media/ actually changed → avoids spurious S3 PUT requests
      - name: Sync mods to S3 (only if changed)
        if: needs.terraform.outputs.mods_changed == 'true'
        run: |
          echo "Mods changed — syncing to S3..."
          aws s3 sync ./mods s3://${{ needs.terraform.outputs.s3_bucket }}/mods/ \
            --size-only --delete

          if [ -d "./media" ]; then
            aws s3 sync ./media s3://${{ needs.terraform.outputs.s3_bucket }}/media/ \
              --size-only --delete
          fi

      - name: Skip sync (no asset changes)
        if: needs.terraform.outputs.mods_changed == 'false'
        run: echo "No changes in mods/ or media/ — skipping S3 sync."

      # Wait for fresh instance to register with SSM (can take ~3 min on first boot)
      - name: Wait for instance to be online in SSM
        id: ssm_wait
        run: |
          INSTANCE_ID="${{ needs.terraform.outputs.instance_id }}"
          echo "Waiting for $INSTANCE_ID to appear in SSM..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "  Attempt $i/60 — SSM status: $STATUS"
            if [ "$STATUS" = "Online" ]; then
              echo "Instance is online."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Instance did not become SSM-online within 10 minutes."
          exit 1

      # Only re-sync mods on the instance if assets changed; always set ownership.
      - name: Apply mods on instance via SSM
        run: |
          INSTANCE_ID="${{ needs.terraform.outputs.instance_id }}"
          S3_BUCKET="${{ needs.terraform.outputs.s3_bucket }}"
          MODS_CHANGED="${{ needs.terraform.outputs.mods_changed }}"

          if [ "$MODS_CHANGED" = "true" ]; then
            SYNC_CMD="aws s3 sync s3://$S3_BUCKET/mods/ /opt/minecraft/mods/ --size-only --delete && \
              aws s3 sync s3://$S3_BUCKET/media/ /opt/minecraft/media/ --size-only --delete || true && \
              cp /opt/minecraft/media/logo64x64.png /opt/minecraft/server-icon.png 2>/dev/null || true"
          else
            SYNC_CMD="echo 'No asset changes — skipping remote sync.'"
          fi

          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=InstanceIds,Values=$INSTANCE_ID" \
            --parameters "commands=[\"$SYNC_CMD\", \"chown -R minecraft:minecraft /opt/minecraft\", \"systemctl restart minecraft\"]" \
            --comment "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
